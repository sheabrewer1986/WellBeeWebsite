<div class="features">

    {% for feature in site.features %}

    {% if feature.title %}
    <div class="feature">
        <div>
            <span class="fa-stack fa-1x">
                <i class="iconBack fas fa-circle fa-stack-2x"></i>
                <i class="iconTop fas fa-{{ feature.fontawesome_icon_name }} fa-stack-1x"></i>
            </span>
        </div>
        <div class="featureText">
            <h3>
                {{ feature.title }}
            </h3>
            <p>
                {{ feature.description }}
            </p>
        </div>
    </div>
    {% endif %}

    {% endfor %}

</div>

<div style="margin-top:40px; text-align:center;">

<h2>Join the WellBee Waiting list</h2>
<p>Be the first to know when WellBee launches.</p>

<form action="https://well-bee.us16.list-manage.com/subscribe/post?u=a35d8b92b22cd2856cc48caf7&amp;id=2c863d2a6b"
      method="post"
      target="_blank"
      style="max-width:420px; margin:20px auto; border:1px solid #eee; padding:20px; border-radius:10px;">

<label>Email Address *</label><br>

<input type="email"
       name="EMAIL"
       required
       style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:6px;">

<label style="font-size:14px;">
<input type="checkbox" name="gdpr[28419]" value="Y" required>
I consent to receive WellBee updates.
</label>

<br><br>

<input type="submit"
       value="Join Waitlist"
       style="background:#f6d65a; color:white; border:none; padding:12px 20px; border-radius:6px; cursor:pointer;">

</form>

</div>
